name: Bug report
description: Report a reproducible problem in avellcc
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please provide enough detail to reproduce the issue.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug
      placeholder: Keyboard LEDs not responding after resume from suspend
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps
      placeholder: |
        1. Run `avellcc keyboard --color red`
        2. Suspend the laptop
        3. Resume
        4. Run `avellcc keyboard --color blue`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: All keys should turn blue.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Error "HIDIOCSFEATURE: device or resource busy".
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      render: shell

  - type: input
    id: version
    attributes:
      label: avellcc version
      placeholder: v0.2.0 or commit SHA
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS and kernel
      placeholder: Arch Linux, kernel 6.12.8
    validations:
      required: true

  - type: input
    id: laptop
    attributes:
      label: Laptop model
      placeholder: Avell Storm 590X

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
